
services:
  # Network-wide DNS + ad-blocking with native DNS-over-HTTPS upstreams.
  # Replaces the former Pi-hole + cloudflared(x2) stack: AdGuard Home does the
  # ad/tracker blocking locally AND forwards upstream over DoH itself, so no
  # separate DoH sidecar is needed. DoH upstreams (Quad9 + Cloudflare-Malware)
  # are configured in AdGuardHome.yaml (see conf volume / the repo template).
  adguardhome:
    container_name: adguardhome
    image: adguard/adguardhome:latest
    hostname: adguardhome
    domainname: ${LOCAL_DOMAIN}
    restart: unless-stopped
    ports:
      # DNS — the network-wide resolver (bind on the host for the whole LAN)
      - '53:53/tcp'
      - '53:53/udp'
      # Web admin UI
      - '80:80/tcp'
      - '443:443/tcp'
      # First-run setup wizard. Only needed if conf/AdGuardHome.yaml has NOT
      # been pre-seeded; can be removed once initial setup is complete.
      - '3000:3000/tcp'
    volumes:
      - ${ADGUARD_BASE}/work:/opt/adguardhome/work
      - ${ADGUARD_BASE}/conf:/opt/adguardhome/conf
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    env_file:
      - .env

  plex:
    container_name: plex
    image: plexinc/pms-docker
    hostname: ${PLEX_HOSTNAME}
    restart: unless-stopped
    domainname: ${LOCAL_DOMAIN}
    ports:
      - '8080:32400/tcp'
      - '32400:32400/tcp'
      - '3005:3005/tcp'
      - '8324:8324/tcp'
      - '32469:32469/tcp'
      - '1900:1900/udp'
      - '32410:32410/udp'
      - '32412:32412/udp'
      - '32413:32413/udp'
      - '32414:32414/udp'
    volumes:
      - ${PLEX_BASE}/data:/config
      - ${PLEX_TRANSCODE}:/transcode
      - ${PLEX_MEDIA}:/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    env_file:
      - .env
    dns:
      - ${SERVER_IP}
      - 192.168.1.1
      - 1.1.1.1
      - 1.0.0.1
    environment:
      - ADVERTISE_IP=http://${SERVER_IP}:32400/
      - PLEX_HOSTNAME=${PLEX_HOSTNAME}
      - PLEX_CLAIM=${PLEX_CLAIM}
